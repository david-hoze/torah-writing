name: Deploy taaluma site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "uman-rosh-hashana/taaluma/**"
      - "sites/taaluma-site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install markdown

      - name: Build site
        run: python sites/taaluma-site/build.py uman-rosh-hashana/taaluma sites/taaluma-site/site

      - name: Create Pages project if it does not exist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages project create taaluma --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy sites/taaluma-site/site --project-name=taaluma --branch=main
